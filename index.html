<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentra | The Sovereign Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-active {
            background: rgba(255, 255, 255, 0.07);
            border-bottom: 2px solid var(--accent);
            color: white;
        }

        .browser-content {
            flex-grow: 1;
            position: relative;
            background: #000;
        }

        .webview-container {
            width: 100%;
            height: 100%;
            display: none;
        }

        .webview-container.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .url-bar:focus-within {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .shimmer {
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .loader {
            height: 3px;
            width: 0%;
            background: var(--accent);
            position: absolute;
            top: 0;
            z-index: 100;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>

    <header class="glass-panel px-4 pt-2 select-none">
        <div class="flex items-center gap-4 mb-2">
            <div class="flex items-center gap-2 pr-4 border-r border-white/10">
                <div class="w-6 h-6 bg-indigo-500 rounded-md flex items-center justify-center">
                    <span class="text-white font-bold text-xs">Z</span>
                </div>
                <span class="font-semibold tracking-wider text-sm shimmer">ZENTRA</span>
            </div>

            <!-- Tab Container -->
            <div id="tab-bar" class="flex items-end gap-1 overflow-x-auto flex-1 no-scrollbar">
                <!-- Tabs generated by JS -->
            </div>

            <button onclick="createNewTab()" class="px-3 py-2 text-white/40 hover:text-white cursor-pointer transition-colors">
                <i class="fa-solid fa-plus text-xs"></i>
            </button>

            <div class="flex items-center gap-4 text-white/60">
                <i class="fa-solid fa-shield-halved hover:text-green-400 cursor-pointer transition-colors"></i>
                <i class="fa-solid fa-gear hover:text-white cursor-pointer"></i>
            </div>
        </div>

        <div class="flex items-center gap-4 pb-3">
            <div class="flex items-center gap-3 text-white/70">
                <button onclick="goBack()" class="hover:text-white"><i class="fa-solid fa-arrow-left"></i></button>
                <button onclick="goForward()" class="hover:text-white"><i class="fa-solid fa-arrow-right"></i></button>
                <button onclick="reloadActiveTab()" class="hover:text-white"><i class="fa-solid fa-rotate-right"></i></button>
            </div>

            <div class="flex-1">
                <div class="url-bar bg-white/5 border border-white/10 rounded-full px-4 py-1.5 flex items-center gap-3 transition-all">
                    <i class="fa-solid fa-lock text-[10px] text-green-500"></i>
                    <input type="text" id="urlInput" 
                        class="bg-transparent border-none outline-none text-sm w-full text-white/90 placeholder-white/20" 
                        placeholder="Search or enter URL"
                        onkeydown="if(event.key==='Enter') navigate()">
                </div>
            </div>

            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-user text-xs"></i>
            </div>
        </div>
    </header>

    <main id="browser-main" class="browser-content">
        <!-- Iframes and Home Screens will be injected here -->
    </main>

    <script>
        let tabs = [];
        let activeTabId = null;

        const tabBar = document.getElementById('tab-bar');
        const browserMain = document.getElementById('browser-main');
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');

        function createNewTab() {
            const id = Date.now().toString();
            const newTab = {
                id: id,
                title: 'New Tab',
                url: '',
                isHome: true
            };
            
            tabs.push(newTab);
            renderTabElement(newTab);
            renderBrowserElement(newTab);
            switchTab(id);
        }

        function renderTabElement(tab) {
            const tabEl = document.createElement('div');
            tabEl.id = `tab-control-${tab.id}`;
            tabEl.className = `tab px-4 py-2 rounded-t-lg text-xs flex items-center gap-3 min-w-[140px] max-w-[200px] cursor-pointer group text-white/50`;
            tabEl.onclick = () => switchTab(tab.id);
            
            tabEl.innerHTML = `
                <i class="fa-solid fa-globe text-indigo-400"></i>
                <span class="truncate flex-1 tab-title-text">${tab.title}</span>
                <i class="fa-solid fa-xmark text-[10px] opacity-0 group-hover:opacity-100 hover:text-red-400 p-1" onclick="closeTab(event, '${tab.id}')"></i>
            `;
            
            tabBar.appendChild(tabEl);
        }

        function renderBrowserElement(tab) {
            const container = document.createElement('div');
            container.id = `browser-view-${tab.id}`;
            container.className = 'webview-container';
            
            container.innerHTML = `
                <div class="home-screen" id="home-${tab.id}">
                    <div class="text-center mb-12">
                        <h1 class="text-6xl font-bold mb-4 shimmer">Zentra</h1>
                        <p class="text-white/40 tracking-widest text-sm uppercase">Secure • Sovereign • Seamless</p>
                    </div>
                    <div class="w-full max-w-2xl px-6">
                        <div class="relative">
                            <input type="text" class="home-search-input w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-xl outline-none focus:bg-white/10 focus:border-indigo-500/50 transition-all text-white"
                                placeholder="Where to next?"
                                onkeydown="if(event.key==='Enter') navigateFromHome(this.value, '${tab.id}')">
                        </div>
                        <div class="grid grid-cols-4 gap-6 mt-12">
                            ${renderQuickLink('Wikipedia', 'https://www.wikipedia.org', 'fa-wikipedia-w', 'indigo', tab.id)}
                            ${renderQuickLink('Reddit', 'https://www.reddit.com', 'fa-reddit-alien', 'orange', tab.id)}
                            ${renderQuickLink('GitHub', 'https://www.github.com', 'fa-github', 'white', tab.id)}
                            ${renderQuickLink('DuckDuckGo', 'https://duckduckgo.com', 'fa-search', 'yellow', tab.id)}
                        </div>
                    </div>
                </div>
                <iframe id="frame-${tab.id}" src="about:blank" class="hidden"></iframe>
            `;
            
            browserMain.appendChild(container);
        }

        function renderQuickLink(name, url, icon, color, tabId) {
            return `
                <button onclick="loadInTab('${url}', '${tabId}')" class="flex flex-col items-center gap-3 group">
                    <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5 group-hover:border-${color}-500/50 group-hover:bg-${color}-500/10 transition-all">
                        <i class="fa-brands ${icon} text-2xl"></i>
                    </div>
                    <span class="text-xs text-white/50 group-hover:text-white">${name}</span>
                </button>
            `;
        }

        function switchTab(id) {
            // Deactivate previous tab
            if (activeTabId) {
                const prevTabControl = document.getElementById(`tab-control-${activeTabId}`);
                const prevBrowserView = document.getElementById(`browser-view-${activeTabId}`);
                if (prevTabControl) prevTabControl.classList.remove('tab-active');
                if (prevBrowserView) prevBrowserView.classList.remove('active');
            }
            
            // Activate new tab
            activeTabId = id;
            const currentTabControl = document.getElementById(`tab-control-${id}`);
            const currentBrowserView = document.getElementById(`browser-view-${id}`);
            const tab = tabs.find(t => t.id === id);
            
            if (currentTabControl) currentTabControl.classList.add('tab-active');
            if (currentBrowserView) currentBrowserView.classList.add('active');
            
            if (tab) {
                urlInput.value = tab.isHome ? '' : tab.url;
            }
            urlInput.focus();
        }

        function closeTab(event, id) {
            event.stopPropagation();
            const index = tabs.findIndex(t => t.id === id);
            if (index === -1) return;

            // Remove from state
            tabs.splice(index, 1);
            
            // Remove from DOM
            const tabControl = document.getElementById(`tab-control-${id}`);
            const browserView = document.getElementById(`browser-view-${id}`);
            if (tabControl) tabControl.remove();
            if (browserView) browserView.remove();

            // Handle focus if we closed the active tab
            if (activeTabId === id) {
                activeTabId = null; // Clear so switchTab doesn't try to remove classes from deleted element
                if (tabs.length > 0) {
                    const nextTab = tabs[Math.max(0, index - 1)];
                    switchTab(nextTab.id);
                } else {
                    createNewTab();
                }
            }
        }

        function loadInTab(url, tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            const processedUrl = processUrl(url);
            
            tab.url = processedUrl;
            tab.isHome = false;
            tab.title = extractDomain(processedUrl);

            // UI Updates
            const home = document.getElementById(`home-${tabId}`);
            const frame = document.getElementById(`frame-${tabId}`);
            const tabTitleContainer = document.querySelector(`#tab-control-${tabId} .tab-title-text`);
            
            if (home) home.style.display = 'none';
            if (frame) {
                frame.classList.remove('hidden');
                frame.src = processedUrl;
            }
            if (tabTitleContainer) tabTitleContainer.textContent = tab.title;

            if (activeTabId === tabId) {
                urlInput.value = processedUrl;
            }

            triggerLoader();
        }

        function processUrl(input) {
            const urlPattern = /^(https?:\/\/)?([\w\d-]+\.)+\w{2,}(\/.*)?$/i;
            if (urlPattern.test(input)) {
                return input.startsWith('http') ? input : `https://${input}`;
            }
            return `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
        }

        function extractDomain(url) {
            try { return new URL(url).hostname.replace('www.', ''); } 
            catch { return url; }
        }

        function navigate() {
            if (activeTabId) loadInTab(urlInput.value, activeTabId);
        }

        function navigateFromHome(val, tabId) {
            loadInTab(val, tabId);
        }

        function triggerLoader() {
            loader.style.width = '30%';
            setTimeout(() => loader.style.width = '70%', 200);
            setTimeout(() => loader.style.width = '100%', 500);
            setTimeout(() => loader.style.width = '0%', 800);
        }

        function reloadActiveTab() {
            if (activeTabId) {
                const frame = document.getElementById(`frame-${activeTabId}`);
                if (frame && !frame.classList.contains('hidden')) {
                    const src = frame.src;
                    frame.src = 'about:blank';
                    setTimeout(() => frame.src = src, 10);
                }
            }
        }

        function goBack() { /* Browsers restrict iframe history access for security */ }
        function goForward() { /* Same security restriction */ }

        // Start with one tab
        window.onload = createNewTab;
    </script>
</body>
</html>
